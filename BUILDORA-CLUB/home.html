<!-- home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUILDORA</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
        }

        #intro{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        #intro video{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        #website{
            display:none;
            width:100%;
            height:100vh;
            background:#000;
            color:#fff;
            justify-content:center;
            align-items:center;
            font-size:40px;
        }
    </style>
</head>

<body>

    <!-- Intro Video -->
    <div id="intro">
        <video id="introVideo" autoplay muted playsinline>
            <source src="assets/V1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Your Website Starts Here -->
    <div id="website">
        <!-- Replace this with your actual website content -->
    </div>

<script>
const video = document.getElementById("introVideo");

video.onended = function () {
    window.location.href = "index.html";
};
</script>

</body>
</html>
